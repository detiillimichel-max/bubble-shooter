<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BOLHÃO – Bubble Shooter</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg1:#0a1628;--bg2:#0e2248;--sky:#1a3a6a;
  --gold:#f5c518;--text:#fff;
  --col-P:#c040e8;--col-T:#28b8d0;--col-G:#38c840;
  --col-R:#e84040;--col-Y:#f0c030;--col-B:#4060e8;
}
html,body{height:100%;width:100%;overflow:hidden;
  background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%);
  font-family:'Segoe UI',sans-serif;color:var(--text);touch-action:none;
  display:flex;flex-direction:column;align-items:center}

/* STARS BG */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.star{position:absolute;background:#fff;border-radius:50%;
  animation:twinkle linear infinite}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.9}}

/* SCREENS */
.scr{display:none;flex-direction:column;align-items:center;
  justify-content:center;position:fixed;inset:0;z-index:10}
.scr.on{display:flex}

/* ── HOME ── */
#home{background:linear-gradient(160deg,#0e2248 0%,#0a1628 100%)}
.home-logo{font-size:clamp(2.8rem,10vw,4.5rem);font-weight:900;
  text-align:center;line-height:1;margin-bottom:6px;
  text-shadow:0 0 30px rgba(200,100,255,.6)}
.home-logo em{color:#c040e8;font-style:normal}
.home-sub{font-size:.8rem;letter-spacing:3px;text-transform:uppercase;
  color:#7090c0;margin-bottom:50px}
.home-balls{display:flex;gap:14px;margin-bottom:44px}
.hball{width:44px;height:44px;border-radius:50%;
  box-shadow:inset -6px -6px 12px rgba(0,0,0,.4),
             inset 4px 4px 10px rgba(255,255,255,.35),
             0 4px 16px rgba(0,0,0,.5);
  animation:hbob .9s ease-in-out infinite alternate}
@keyframes hbob{0%{transform:translateY(0)}100%{transform:translateY(-10px)}}
.hball:nth-child(2){animation-delay:.15s}
.hball:nth-child(3){animation-delay:.3s}
.hball:nth-child(4){animation-delay:.45s}
.hball:nth-child(5){animation-delay:.6s}
.big-btn{background:linear-gradient(135deg,#c040e8,#8020c0);
  color:#fff;border:none;padding:18px 56px;border-radius:50px;
  font-size:1.2rem;font-weight:900;cursor:pointer;letter-spacing:1px;
  box-shadow:0 6px 28px rgba(192,64,232,.5);
  transition:transform .12s,box-shadow .12s;text-transform:uppercase}
.big-btn:active{transform:scale(.95);box-shadow:0 2px 10px rgba(192,64,232,.3)}
.home-cr{position:absolute;bottom:18px;font-size:.62rem;color:#4a6080;text-align:center;line-height:1.8}

/* ── GAME ── */
#game{background:transparent;justify-content:flex-start;padding:0}

/* Header */
.ghdr{width:100%;max-width:420px;display:flex;align-items:center;
  justify-content:space-between;padding:10px 16px 6px;flex-shrink:0;
  background:rgba(10,22,40,.6);backdrop-filter:blur(6px);z-index:20}
.score-box{display:flex;align-items:center;gap:8px}
.coin{width:28px;height:28px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#ffe060,#d09010);
  box-shadow:0 2px 8px rgba(200,140,0,.5);
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:900;color:#7a4000}
.score-val{font-size:1.3rem;font-weight:900;min-width:50px}
.stars-row{display:flex;gap:6px}
.star-icon{font-size:1.1rem;color:#4a5a70;transition:color .3s}
.star-icon.lit{color:var(--gold)}
.level-badge{font-size:.85rem;font-weight:700;color:#90b0e0}
.gear-btn{width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(255,255,255,.08);color:#90b0e0;font-size:1rem;cursor:pointer}

/* Canvas area */
.canvas-wrap{position:relative;width:100%;max-width:420px;flex:1;
  display:flex;align-items:flex-start;justify-content:center;overflow:hidden}
#gc{display:block;touch-action:none}

/* Shooter area */
.shooter-area{width:100%;max-width:420px;flex-shrink:0;
  background:rgba(8,18,36,.85);backdrop-filter:blur(6px);
  padding:10px 0 16px;display:flex;flex-direction:column;
  align-items:center;gap:8px;z-index:20}
.balls-row{display:flex;align-items:center;gap:20px}
.next-label{font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;
  color:#5070a0}
.shots-left{font-size:1.1rem;font-weight:900;
  background:#0e1e38;border:2px solid #1a3a6a;
  border-radius:50px;padding:4px 16px;color:#90c0ff}
.power-row{display:flex;gap:12px}
.power-btn{width:52px;height:52px;border-radius:50%;border:2px solid var(--gold);
  background:rgba(245,197,24,.08);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  transition:background .15s}
.power-btn:hover{background:rgba(245,197,24,.2)}
.power-btn .badge{position:absolute;bottom:-4px;right:-4px;
  background:var(--gold);color:#1a0;border-radius:50%;
  width:18px;height:18px;font-size:.6rem;font-weight:900;
  display:flex;align-items:center;justify-content:center}
.pwrap{position:relative}

/* WIN/LOSE overlay */
#endscr{display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.75);align-items:center;justify-content:center}
#endscr.on{display:flex}
.end-card{background:linear-gradient(135deg,#0e2248,#1a3060);
  border:2px solid #2a4a90;border-radius:24px;
  padding:36px 40px;text-align:center;max-width:300px;width:88%;
  animation:popin .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes popin{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.end-emoji{font-size:3.5rem;margin-bottom:8px}
.end-title{font-size:2rem;font-weight:900;margin-bottom:4px}
.end-sub{color:#7090c0;font-size:.9rem;margin-bottom:6px}
.end-stars{font-size:1.8rem;margin-bottom:20px;letter-spacing:6px}
.end-btns{display:flex;flex-direction:column;gap:10px}
.end-btn{padding:14px;border-radius:50px;border:none;
  font-size:1rem;font-weight:900;cursor:pointer;transition:transform .1s}
.end-btn:active{transform:scale(.96)}
.end-btn.nx{background:linear-gradient(135deg,#c040e8,#8020c0);color:#fff}
.end-btn.rt{background:rgba(255,255,255,.08);color:#c0d0f0}

/* Pause modal */
#pausescr{display:none;position:fixed;inset:0;z-index:150;
  background:rgba(0,0,0,.7);align-items:center;justify-content:center}
#pausescr.on{display:flex}
.pause-card{background:#0e2248;border:1.5px solid #2a4a90;
  border-radius:20px;padding:30px 36px;text-align:center;width:280px}
.pause-card h2{font-size:1.4rem;margin-bottom:20px}
.pause-btns{display:flex;flex-direction:column;gap:10px}
.pbtn{padding:13px;border-radius:50px;border:none;
  font-weight:900;font-size:.95rem;cursor:pointer}
.pbtn.resume{background:linear-gradient(135deg,#c040e8,#8020c0);color:#fff}
.pbtn.quit{background:rgba(255,255,255,.08);color:#c0d0f0}

/* confetti */
.cp{position:fixed;width:8px;height:14px;border-radius:2px;
  pointer-events:none;z-index:300;animation:cfll linear forwards}
@keyframes cfll{0%{opacity:1;transform:translateY(-20px) rotate(0)}
  100%{opacity:.1;transform:translateY(110vh) rotate(800deg)}}
</style>
</head>
<body>
<div id="stars"></div>

<!-- HOME -->
<div id="home" class="scr on">
  <div class="home-logo">BOL<em>HÃO</em></div>
  <div class="home-sub">Bubble Shooter</div>
  <div class="home-balls">
    <div class="hball" style="background:var(--col-P)"></div>
    <div class="hball" style="background:var(--col-T);animation-delay:.12s"></div>
    <div class="hball" style="background:var(--col-G);animation-delay:.24s"></div>
    <div class="hball" style="background:var(--col-R);animation-delay:.36s"></div>
    <div class="hball" style="background:var(--col-Y);animation-delay:.48s"></div>
  </div>
  <button class="big-btn" id="startbtn">JOGAR</button>
  <div class="home-cr">Criado por Michel Detilli · Bom Jesus dos Perdões-SP · 2026</div>
</div>

<!-- GAME -->
<div id="game" class="scr">
  <div class="ghdr">
    <div class="score-box">
      <div class="coin">★</div>
      <div class="score-val" id="scoreval">0</div>
    </div>
    <div class="stars-row">
      <div class="star-icon" id="s1">★</div>
      <div class="star-icon" id="s2">★</div>
      <div class="star-icon" id="s3">★</div>
    </div>
    <div id="livesdisplay" style="font-size:1rem;letter-spacing:1px">❤️❤️❤️❤️❤️</div>
    <div class="level-badge" id="lvlbadge">Fase 1</div>
    <button class="gear-btn" id="gearbtn">⚙</button>
  </div>

  <div class="canvas-wrap" id="cwrap">
    <canvas id="gc"></canvas>
  </div>

  <div class="shooter-area">
    <div class="shots-left" id="shotsleft">60 bolhas</div>
    <div class="balls-row">
      <canvas id="nextball" width="44" height="44"></canvas>
      <canvas id="currball" width="54" height="54"></canvas>
      <div class="next-label">PRÓX</div>
    </div>
  </div>
</div>

<!-- END -->
<div id="endscr">
  <div class="end-card">
    <div class="end-emoji" id="endemoji">🎉</div>
    <div class="end-title" id="endtitle">Parabéns!</div>
    <div class="end-sub"  id="endsub">Fase 1 concluída</div>
    <div class="end-stars" id="endstars">★★★</div>
    <div class="end-btns">
      <button class="end-btn nx" id="nxtbtn">Próxima Fase →</button>
      <button class="end-btn rt" id="rtybtn">Tentar Novamente</button>
    </div>
  </div>
</div>

<!-- PAUSE -->
<div id="pausescr">
  <div class="pause-card">
    <h2>⏸ Pausado</h2>
    <div class="pause-btns">
      <button class="pbtn resume" id="resumebtn">Continuar</button>
      <button class="pbtn quit"   id="quitbtn">Menu Principal</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════════════
const COLORS=['#c040e8','#28b8d0','#38c840','#e84040','#f0c030','#4060e8'];
const CNAMES=['P','T','G','R','Y','B'];
const R=22; // bubble radius
const COLS=9;

// ═══════════════════════════════════════════════
// NÍVEL CONFIG
// Cada nível: linhas do grid no topo (array de strings)
// '.' = vazio, PTGRBY = cor
// Linhas pares têm 9 cols, ímpares têm 8 (hex offset)
// IMPORTANTE: grupos de mesma cor sempre ≥3 adjacentes
// para que criança consiga estourar sem frustração
// ═══════════════════════════════════════════════
function genLevel(lvl){
  const maps=[
    // Fase 1 — MUITO FÁCIL, 3 cores, blocos grandes
    [
      'PPP......',
      '.PPP.....',
      'TTT......',
      '.TTT.....',
      'GGG......',
      '.GGG.....',
    ],
    // Fase 2 — FÁCIL, 3 cores, blocos horizontais largos
    [
      'PPPPPPPPP',
      '.PPPPPPP.',
      'TTTTTTTTT',
      '.TTTTTTT.',
      'GGGGGGGGG',
      '.GGGGGGG.',
    ],
    // Fase 3 — FÁCIL, 4 cores, blocos de 3+
    [
      'PPPPGGGGG',
      '.PPPGGGG.',
      'PPPPGGGGG',
      '.RRRRRRR.',
      'RRRRRTTTT',
      '.TTTTTTT.',
      'TTTT.....',
    ],
    // Fase 4 — MÉDIO, 4 cores, blocos 2x3 e 3x2
    [
      'PPPPPTTTT',
      '.PPPPTTT.',
      'PPPPPTTTT',
      '.GGGGRRR.',
      'GGGGGRRRR',
      '.GGGGRRR.',
      'GGGGGRRRR',
    ],
    // Fase 5 — MÉDIO, 4 cores (não 6!), grupos de 3+
    [
      'PPPTTTGGG',
      '.PPPTTG..',
      'PPPTTTGGG',
      '.RRRPPPTT',
      'RRRPPPTTT',
      '.GGGRRRTT',
      'GGGRRRTTT',
    ],
    // Fase 6 — DIFÍCIL (mas justa), 5 cores, grupos garantidos
    [
      'PPPTTTGGG',
      '.PPPTTG..',
      'PPPTTTGGG',
      '.RRRYYYB.',
      'RRRYYYBBB',
      '.GGGPPPTT',
      'GGGPPPTTT',
      '.RRRYYYB.',
    ],
  ];
  const idx=Math.min(lvl-1, maps.length-1);
  return maps[idx].map((row,i)=>{
    const maxLen= i%2===0 ? 9 : 8;
    return row.replace(/ /g,'').substring(0,maxLen);
  });
}

// ═══════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════
let canvas,ctx,CW,CH;
let bubbles=[];
let shooter={color:'#c040e8',x:0,y:0,angle:-Math.PI/2};
let nextColor='#28b8d0';
let projectile=null;
let score=0,level=1,shots=60,lives=5;
let paused=false,gameOver=false,gameStarted=false;
let raf=null,lastT=0;
let wallLeft,wallRight,ceilY;
let rowH,colW,offsetX;

// ═══════════════════════════════════════════════
// COR VÁLIDA — garante que o canhão sempre tem
// uma cor que existe no grid
// ═══════════════════════════════════════════════
function liveColors(){
  return [...new Set(
    bubbles.filter(b=>!b.dead&&!b.popping&&!b.falling).map(b=>b.color)
  )];
}
function accessibleColors(){
  const alive=bubbles.filter(b=>!b.dead&&!b.popping&&!b.falling);
  if(!alive.length) return liveColors();
  const maxRow=Math.max(...alive.map(b=>b.row));
  const minRow=Math.max(0,maxRow-1);
  const botColors=[...new Set(
    alive.filter(b=>b.row>=minRow).map(b=>b.color)
  )];
  return botColors.length ? botColors : liveColors();
}
function safeColor(){
  const cols=accessibleColors();
  if(!cols.length) return COLORS[0];
  return cols[Math.floor(Math.random()*cols.length)];
}
function fixColors(){
  const cols=accessibleColors();
  if(!cols.length) return;
  if(!cols.includes(shooter.color))
    shooter.color=cols[Math.floor(Math.random()*cols.length)];
  if(!cols.includes(nextColor))
    nextColor=cols[Math.floor(Math.random()*cols.length)];
  if(cols.length>1 && nextColor===shooter.color){
    const others=cols.filter(c=>c!==shooter.color);
    if(others.length) nextColor=others[Math.floor(Math.random()*others.length)];
  }
}

// ═══════════════════════════════════════════════
// STARS / SCORE / LIVES DISPLAY
// ═══════════════════════════════════════════════
function updateStars(){
  const s=score>=300?3:score>=150?2:score>=50?1:0;
  ['s1','s2','s3'].forEach((id,i)=>{
    document.getElementById(id).classList.toggle('lit',i<s);
  });
}
function updateLives(){
  const el=document.getElementById('livesdisplay');
  if(el) el.textContent='❤️'.repeat(lives)+'🖤'.repeat(Math.max(0,5-lives));
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
document.getElementById('startbtn').addEventListener('click',()=>{
  showScreen('game'); startGame();
});
document.getElementById('gearbtn').addEventListener('click',()=>{
  paused=true; showOverlay('pausescr');
});
document.getElementById('resumebtn').addEventListener('click',()=>{
  paused=false; hideOverlay('pausescr');
});
document.getElementById('quitbtn').addEventListener('click',()=>{
  paused=false; hideOverlay('pausescr'); showScreen('home');
});
document.getElementById('nxtbtn').addEventListener('click',()=>{
  hideOverlay('endscr'); level++; startGame();
});
document.getElementById('rtybtn').addEventListener('click',()=>{
  hideOverlay('endscr'); startGame();
});

function showScreen(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}
function showOverlay(id){ document.getElementById(id).classList.add('on'); }
function hideOverlay(id){ document.getElementById(id).classList.remove('on'); }

// ═══════════════════════════════════════════════
// START GAME
// ═══════════════════════════════════════════════
function startGame(){
  canvas=document.getElementById('gc');
  ctx=canvas.getContext('2d');
  const wrap=document.getElementById('cwrap');
  CW=Math.min(wrap.clientWidth,420);
  CH=wrap.clientHeight;
  canvas.width=CW; canvas.height=CH;

  score=0; shots=60; lives=5; paused=false; gameOver=false; gameStarted=false;
  projectile=null;

  document.getElementById('scoreval').textContent='0';
  document.getElementById('lvlbadge').textContent='Fase '+level;
  updateStars(); updateLives();

  colW=(CW-4)/COLS;
  rowH=colW*0.866;
  offsetX=colW/2+2;
  wallLeft=2; wallRight=CW-2;
  ceilY=R+2;

  buildGrid(genLevel(level));

  document.getElementById('shotsleft').textContent=shots+' bolhas';

  // Cores iniciais — tiradas do grid recém construído
  const ic=liveColors();
  shooter.color=ic[0]||COLORS[0];
  nextColor=ic.length>1?ic[1]:ic[0]||COLORS[0];
  shooter.x=CW/2;
  shooter.y=CH-20;
  shooter.angle=-Math.PI/2;

  fixColors();
  drawNextBalls();
  setupInput();
  if(raf) cancelAnimationFrame(raf);
  lastT=0;
  raf=requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════
// BUILD GRID FROM PATTERN
// ═══════════════════════════════════════════════
function buildGrid(rows){
  bubbles=[];
  rows.forEach((rowStr,row)=>{
    const maxCols=row%2===0?COLS:COLS-1;
    for(let col=0;col<rowStr.length&&col<maxCols;col++){
      const ch=rowStr[col].toUpperCase();
      if(ch==='.'||ch===' ') continue;
      const ci=CNAMES.indexOf(ch);
      if(ci<0) continue;
      bubbles.push(makeBubble(col,row,COLORS[ci]));
    }
  });
}
function makeBubble(col,row,color){
  return{col,row,color,
    x:colX(col,row), y:rowY(row),
    dead:false,popping:false,popT:0,
    vy:0,falling:false};
}
function colX(col,row){ return offsetX+col*colW+(row%2===0?0:colW/2); }
function rowY(row){ return ceilY+row*rowH; }

// ═══════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════
let inputBound=false;
function setupInput(){
  if(inputBound) return; inputBound=true;
  canvas.addEventListener('mousemove',onAim);
  canvas.addEventListener('mousedown',onShoot);
  canvas.addEventListener('touchmove',e=>{e.preventDefault();onAim(e.touches[0]);},{passive:false});
  canvas.addEventListener('touchend', e=>{e.preventDefault();onShoot(e.changedTouches[0]);},{passive:false});
}
function onAim(e){
  if(paused||gameOver||projectile) return;
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  shooter.angle=Math.atan2(my-shooter.y, mx-shooter.x);
  if(shooter.angle>-0.15) shooter.angle=-0.15;
  if(shooter.angle<-Math.PI+0.15) shooter.angle=-Math.PI+0.15;
}
function onShoot(e){
  if(paused||gameOver||projectile) return;
  if(shots<=0) return;
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  shooter.angle=Math.atan2(my-shooter.y, mx-shooter.x);
  if(shooter.angle>-0.15) shooter.angle=-0.15;
  if(shooter.angle<-Math.PI+0.15) shooter.angle=-Math.PI+0.15;

  fixColors();

  const spd=700;
  projectile={
    x:shooter.x, y:shooter.y,
    vx:Math.cos(shooter.angle)*spd,
    vy:Math.sin(shooter.angle)*spd,
    color:shooter.color
  };
  gameStarted=true;
  shots--;
  document.getElementById('shotsleft').textContent=shots+' bolhas';
  playShoot();
}

// ═══════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════
function loop(t){
  raf=requestAnimationFrame(loop);
  const dt=lastT?Math.min((t-lastT)/1000,0.05):0.016;
  lastT=t;
  if(paused) return;

  update(dt);
  draw();
}

// ═══════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════
function update(dt){
  bubbles.forEach(b=>{
    if(b.popping){ b.popT+=dt*4; if(b.popT>=1) b.dead=true; }
    if(b.falling){ b.vy+=900*dt; b.y+=b.vy*dt; if(b.y>CH+100) b.dead=true; }
  });
  bubbles=bubbles.filter(b=>!b.dead);

  if(projectile){
    projectile.x+=projectile.vx*dt;
    projectile.y+=projectile.vy*dt;
    if(projectile.x-R<wallLeft){ projectile.x=wallLeft+R; projectile.vx*=-1; }
    if(projectile.x+R>wallRight){ projectile.x=wallRight-R; projectile.vx*=-1; }
    if(projectile.y-R<ceilY){ snapProjectile(); return; }
    for(const b of bubbles){
      if(b.dead||b.popping||b.falling) continue;
      const dx=projectile.x-b.x, dy=projectile.y-b.y;
      if(dx*dx+dy*dy<(R*2-2)*(R*2-2)){ snapProjectile(); return; }
    }
    if(projectile.y>CH+50) projectile=null;
  }

  if(gameOver) return;

  const alive=bubbles.filter(b=>!b.dead&&!b.popping&&!b.falling);

  if(!gameStarted) return;

  // VITÓRIA — grid limpo
  if(alive.length===0 && !projectile){
    setTimeout(()=>endLevel(true),400);
    gameOver=true;
    return;
  }

  // DERROTA — bolhas tocaram a zona de perigo
  // Zona mais tolerante: apenas 1.5 raios acima do canhão
  const dangerY=shooter.y - R*1.5;
  if(alive.some(b=>b.y>=dangerY)){
    lives=0;
    updateLives();
    setTimeout(()=>endLevel(false),200);
    gameOver=true;
    return;
  }

  // DERROTA — acabaram as bolhas e ainda restam bubbles
  if(shots<=0 && !projectile && alive.length>0){
    setTimeout(()=>endLevel(false),300);
    gameOver=true;
    return;
  }
}

// ═══════════════════════════════════════════════
// SNAP PROJECTILE TO GRID
// ═══════════════════════════════════════════════
function snapProjectile(){
  if(!projectile) return;
  const {x,y,color}=projectile;
  projectile=null;

  const occupied=new Set(
    bubbles.filter(b=>!b.dead&&!b.popping&&!b.falling).map(b=>b.col+','+b.row)
  );
  const candidates=new Set();
  for(let col=0;col<COLS;col++) candidates.add(col+',0');
  bubbles.filter(b=>!b.dead&&!b.popping&&!b.falling).forEach(b=>{
    adjCells(b.col,b.row).forEach(([nc,nr])=>{
      if(nc>=0&&nc<COLS&&nr>=0&&nr<20){
        const k=nc+','+nr;
        if(!occupied.has(k)) candidates.add(k);
      }
    });
  });

  let bestRow=0,bestCol=0,bestDist=Infinity;
  candidates.forEach(k=>{
    const [col,row]=k.split(',').map(Number);
    const gx=colX(col,row), gy=rowY(row);
    if(gy>CH) return;
    const d=(gx-x)**2+(gy-y)**2;
    if(d<bestDist){ bestDist=d; bestRow=row; bestCol=col; }
  });

  const nb=makeBubble(bestCol,bestRow,color);
  bubbles.push(nb);
  playSnap();

  // Avançar: shooter ← nextColor, gerar novo next
  shooter.color=nextColor;
  nextColor=safeColor();
  fixColors();
  drawNextBalls();

  // Verificar grupo de 3+
  const group=findGroup(nb);
  if(group.length>=3){
    score+=group.length*10;
    document.getElementById('scoreval').textContent=score;
    updateStars();
    group.forEach(b=>{ b.popping=true; b.popT=0; });
    playPop();
    setTimeout(()=>{
      dropFloating();
      fixColors();
      drawNextBalls();
    },120);
  } else {
    // NÃO perde vida! Só mensagem amigável
    showToast('Bubble adicionada! Tente formar 3+!');
    playMiss();
  }
}

function adjCells(col,row){
  const even=row%2===0;
  const ns=[[col-1,row],[col+1,row],[col,row-1],[col,row+1]];
  if(even) ns.push([col-1,row-1],[col-1,row+1]);
  else     ns.push([col+1,row-1],[col+1,row+1]);
  return ns;
}

// ═══════════════════════════════════════════════
// BFS GROUP FIND
// ═══════════════════════════════════════════════
function neighbors(b){
  return adjCells(b.col,b.row)
    .map(([nc,nr])=>bubbles.find(x=>!x.dead&&!x.popping&&!x.falling&&x.col===nc&&x.row===nr))
    .filter(Boolean);
}
function findGroup(start){
  const visited=new Set();
  const queue=[start];
  visited.add(start);
  while(queue.length){
    const cur=queue.shift();
    neighbors(cur).forEach(n=>{
      if(n&&!visited.has(n)&&n.color===start.color){
        visited.add(n); queue.push(n);
      }
    });
  }
  return [...visited];
}
function dropFloating(){
  const live=bubbles.filter(b=>!b.dead&&!b.popping&&!b.falling);
  const connected=new Set(live.filter(b=>b.row===0));
  const q=[...connected];
  while(q.length){
    const cur=q.shift();
    neighbors(cur).forEach(n=>{
      if(!connected.has(n)){ connected.add(n); q.push(n); }
    });
  }
  let dropped=0;
  live.forEach(b=>{
    if(!connected.has(b)){
      b.falling=true; b.vy=-80+Math.random()*160;
      score+=5; dropped++;
    }
  });
  if(dropped>0){
    document.getElementById('scoreval').textContent=score;
    updateStars();
  }
}

// ═══════════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════════
function draw(){
  ctx.clearRect(0,0,CW,CH);

  if(!projectile && gameStarted) fixColors();

  // background gradient
  const bg=ctx.createLinearGradient(0,0,0,CH);
  bg.addColorStop(0,'#0e2248'); bg.addColorStop(1,'#0a1628');
  ctx.fillStyle=bg; ctx.fillRect(0,0,CW,CH);

  // danger line — zona de perigo amigável
  const dangerY=CH-140;
  ctx.save();
  ctx.setLineDash([6,6]);
  ctx.strokeStyle='rgba(255,80,80,.3)';
  ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,dangerY); ctx.lineTo(CW,dangerY); ctx.stroke();
  ctx.restore();

  // bubbles
  bubbles.forEach(b=>{
    if(b.dead) return;
    let scale=1;
    if(b.popping) scale=1+b.popT*0.5;
    if(b.falling) scale=1;
    drawBubble(ctx,b.x,b.y,R*scale,b.color,b.popping?1-b.popT:1);
  });

  // aim line
  if(!projectile){
    drawAim();
  }

  // projectile
  if(projectile){
    drawBubble(ctx,projectile.x,projectile.y,R,projectile.color,1);
  }

  // shooter base
  drawShooter();
}

function drawBubble(c,x,y,r,color,alpha){
  c.save();
  c.globalAlpha=Math.max(0,alpha);

  c.beginPath(); c.arc(x+2,y+3,r,0,Math.PI*2);
  c.fillStyle='rgba(0,0,0,.35)'; c.fill();

  c.beginPath(); c.arc(x,y,r,0,Math.PI*2);
  c.fillStyle=color; c.fill();

  const grd=c.createRadialGradient(x-r*.3,y-r*.3,r*.1,x,y,r);
  grd.addColorStop(0,'rgba(255,255,255,.45)');
  grd.addColorStop(.5,'rgba(255,255,255,.0)');
  grd.addColorStop(1,'rgba(0,0,0,.35)');
  c.beginPath(); c.arc(x,y,r,0,Math.PI*2);
  c.fillStyle=grd; c.fill();

  c.beginPath(); c.arc(x-r*.3,y-r*.3,r*.28,0,Math.PI*2);
  c.fillStyle='rgba(255,255,255,.55)'; c.fill();

  c.beginPath(); c.arc(x,y,r,0,Math.PI*2);
  c.strokeStyle='rgba(255,255,255,.18)'; c.lineWidth=1.5; c.stroke();

  c.restore();
}

function drawShooter(){
  const x=shooter.x, y=shooter.y;
  const ax=x+Math.cos(shooter.angle)*36;
  const ay=y+Math.sin(shooter.angle)*36;

  ctx.beginPath(); ctx.arc(x,y,20,0,Math.PI*2);
  const rg=ctx.createRadialGradient(x,y,4,x,y,20);
  rg.addColorStop(0,'#2a4a8a'); rg.addColorStop(1,'#0e1e3a');
  ctx.fillStyle=rg; ctx.fill();
  ctx.strokeStyle='rgba(100,160,255,.4)'; ctx.lineWidth=2; ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x,y); ctx.lineTo(ax,ay);
  ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=2.5;
  ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);

  drawBubble(ctx,x,y,R*.9,shooter.color,1);
}

function drawAim(){
  let x=shooter.x, y=shooter.y;
  let vx=Math.cos(shooter.angle), vy=Math.sin(shooter.angle);
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,.25)';
  ctx.lineWidth=2;
  ctx.setLineDash([6,8]);
  ctx.beginPath(); ctx.moveTo(x,y);
  const steps=60;
  const step=12;
  for(let i=0;i<steps;i++){
    x+=vx*step; y+=vy*step;
    if(x-R<wallLeft){ x=wallLeft+R; vx*=-1; }
    if(x+R>wallRight){ x=wallRight-R; vx*=-1; }
    ctx.lineTo(x,y);
    if(y<ceilY+R){ break; }
    let hit=false;
    for(const b of bubbles){
      if(b.dead||b.popping||b.falling) continue;
      if((x-b.x)**2+(y-b.y)**2<(R*2+4)**2){ hit=true; break; }
    }
    if(hit) break;
  }
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ═══════════════════════════════════════════════
// DRAW NEXT/CURR BALLS IN UI
// ═══════════════════════════════════════════════
function drawNextBalls(){
  const cc=document.getElementById('currball');
  const cx=cc.getContext('2d');
  cc.width=54; cc.height=54;
  cx.clearRect(0,0,54,54);
  drawBubble(cx,27,27,24,shooter.color,1);

  const nc=document.getElementById('nextball');
  const nx=nc.getContext('2d');
  nc.width=44; nc.height=44;
  nx.clearRect(0,0,44,44);
  drawBubble(nx,22,22,18,nextColor,1);
}

// ═══════════════════════════════════════════════
// END LEVEL
// ═══════════════════════════════════════════════
function endLevel(win){
  const stars=win?(shots>=40?3:shots>=20?2:1):0;
  document.getElementById('endemoji').textContent=win?'🎉':'😅';
  document.getElementById('endtitle').textContent=win?'Incrível!':'Quase lá!';
  document.getElementById('endsub').textContent=win?
    `Fase ${level} · ${score} pontos · ${lives} vida${lives!==1?'s':''}`:
    `Fase ${level} · Não desanima! Tenta de novo! 🌟`;
  document.getElementById('endstars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('nxtbtn').style.display=win?'block':'none';
  showOverlay('endscr');
  if(win){ confetti(); }
}

// ═══════════════════════════════════════════════
// TOAST — mensagem rápida na tela
// ═══════════════════════════════════════════════
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){
    t=document.createElement('div');
    t.id='toast';
    t.style.cssText=`position:fixed;bottom:180px;left:50%;transform:translateX(-50%);
      background:rgba(20,40,100,.92);color:#fff;padding:10px 22px;border-radius:50px;
      font-weight:700;font-size:.9rem;z-index:300;pointer-events:none;
      animation:toastfade 2s ease forwards`;
    const st=document.createElement('style');
    st.textContent='@keyframes toastfade{0%{opacity:1}70%{opacity:1}100%{opacity:0}}';
    document.head.appendChild(st);
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.animation='none'; void t.offsetWidth;
  t.style.animation='toastfade 2s ease forwards';
}

// ═══════════════════════════════════════════════
// STARS BACKGROUND
// ═══════════════════════════════════════════════
(function makeStars(){
  const c=document.getElementById('stars');
  for(let i=0;i<80;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*2.5+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      animation-duration:${1.5+Math.random()*3}s;
      animation-delay:${Math.random()*3}s`;
    c.appendChild(s);
  }
})();

// ═══════════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════════
function confetti(){
  const cols=['#c040e8','#28b8d0','#38c840','#e84040','#f0c030','#4060e8','#fff'];
  for(let i=0;i<65;i++){
    const el=document.createElement('div');
    el.className='cp';
    el.style.left=Math.random()*100+'vw';
    el.style.background=cols[Math.floor(Math.random()*cols.length)];
    el.style.transform=`rotate(${Math.random()*360}deg)`;
    el.style.animationDuration=(.6+Math.random()*1.4)+'s';
    el.style.animationDelay=(Math.random()*.6)+'s';
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

// ═══════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════
let AC=null;
function ac(){ if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)(); return AC; }
function tone(freq,type,gain,dur,when){
  try{
    const c=ac(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=type; o.frequency.value=freq;
    const t=when||c.currentTime;
    g.gain.setValueAtTime(gain,t);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.start(t); o.stop(t+dur);
  }catch(e){}
}
function playShoot(){ tone(600,'sine',.08,.08); }
function playSnap() { tone(400,'sine',.06,.06); }
function playMiss()  { tone(180,'sawtooth',.1,.18); }
function playPop()  {
  try{
    const c=ac();
    [0,.04,.08].forEach((d,i)=>{ tone(300-i*60,'sine',.1,.12,c.currentTime+d); });
  }catch(e){}
}
